<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語能力試験 N2 演習</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBFAF7; --ink:#1A1A1E; --ai:#2D4B73; --gold:#E8A33D;
  --ok:#3E7C5B; --ng:#B5453C; --line:#E3E0D8; --dim:#8A8780; --mid:#55555A;
}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:'Noto Sans JP',sans-serif;padding:0 16px 56px}
.wrap{max-width:720px;margin:0 auto}
.serif{font-family:'Noto Serif JP',serif}
header{display:flex;align-items:baseline;justify-content:space-between;padding:28px 0 12px;border-bottom:3px double var(--ai);margin-bottom:24px}
h1{font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;letter-spacing:.08em;color:var(--ai);margin:0}
.sub{font-size:12px;color:var(--dim);letter-spacing:.15em}
.card{background:#fff;border:1px solid var(--line);border-radius:6px;padding:22px 22px 18px;margin-bottom:16px;box-shadow:0 1px 2px rgba(26,26,30,.04)}
.tag{display:inline-block;background:var(--ai);color:var(--paper);font-size:13px;font-weight:700;padding:3px 12px;border-radius:3px;letter-spacing:.1em;margin-bottom:8px}
.instr{font-size:13px;color:var(--mid);border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:16px}
.qtext{font-family:'Noto Serif JP',serif;font-size:19px;line-height:1.9;margin-bottom:18px}
.qtext u{text-underline-offset:4px;font-weight:700}
.passage{font-family:'Noto Serif JP',serif;font-size:16px;line-height:2;background:#F6F4EE;border:1px solid var(--line);border-radius:4px;padding:16px 18px;margin-bottom:18px}
.opt{display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;padding:12px 14px;margin-bottom:8px;border-radius:5px;font-family:'Noto Serif JP',serif;font-size:17px;line-height:1.7;cursor:pointer;border:1.5px solid #DAD6CC;background:#fff;color:var(--ink);transition:background .15s,border-color .15s}
.opt:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
.opt .c{color:var(--ai);font-weight:700;flex-shrink:0}
.opt.correct{border-color:var(--ok);background:#EDF5F0}
.opt.wrong{border-color:var(--ng);background:#F9EDEB}
.opt.locked{cursor:default}
.btn{background:var(--ai);color:var(--paper);border:1.5px solid var(--ai);border-radius:5px;padding:10px 22px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Noto Sans JP',sans-serif;letter-spacing:.05em}
.btn.ghost{background:transparent;color:var(--ai)}
.btn.gold{background:var(--gold);border-color:var(--gold);color:var(--ink);font-weight:700}
.btn:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
.exp{background:#F6F4EE;border-left:4px solid var(--gold);padding:12px 16px;font-size:14.5px;line-height:1.8;margin-top:14px;border-radius:0 4px 4px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
.secBtn{background:#fff;border:1.5px solid #DAD6CC;border-radius:6px;padding:16px 14px;text-align:left;cursor:pointer;font-family:inherit}
.secBtn:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
.secBtn .t{font-size:11px;color:var(--dim);letter-spacing:.1em;margin-bottom:3px}
.secBtn .l{font-family:'Noto Serif JP',serif;font-size:17px;font-weight:700}
.secBtn .n{font-size:12px;color:var(--dim);margin-top:4px}
.timer{font-variant-numeric:tabular-nums;font-weight:700;font-size:16px;color:var(--ai)}
.timer.low{color:var(--ng)}
.row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #F0EDE5;font-size:15px}
.right{text-align:right}
.score{font-family:'Noto Serif JP',serif;font-size:44px;font-weight:700;text-align:center}
.small{font-size:12.5px;color:var(--dim);line-height:1.7}
.miss{border-top:1px solid #F0EDE5;padding:12px 0}
.pill{display:inline-block;font-size:11px;border:1px solid var(--line);border-radius:99px;padding:1px 10px;color:var(--mid);margin-left:8px;vertical-align:middle}
.hd2{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:700;color:var(--ai);margin:22px 0 12px}
footer{margin-top:28px;font-size:11.5px;color:var(--dim);line-height:1.8}
@media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap" id="app"><header><h1>日本語能力試験 N2 演習</h1><div class="sub">読み込み中…</div></header></div>

<script>
/* ============ curated exam-format questions (formats that can't be auto-generated) ============ */
const CURATED = [
 {s:"yoho",q:"「取り組む」",opts:["チーム全体で品質改善に取り組んでいる。","朝ご飯にパンを取り組んだ。","駅で切符を取り組んでください。","書類をかばんに取り組んだ。"],a:0,exp:"取り組む = to tackle / work on（課題・問題に取り組む）。"},
 {s:"yoho",q:"「実施」",opts:["来月、ユーザーテストを実施する予定だ。","彼は毎晩遅くまで実施している。","この料理は母が実施したものだ。","新しい靴を実施して出かけた。"],a:0,exp:"実施（じっし）= carry out（計画・テスト・調査などを実施する）。"},
 {s:"yoho",q:"「めど」",opts:["来週末をめどに資料を完成させます。","彼はめどが高くて話しにくい。","このスープはめどが足りない。","会議室のめどを開けてください。"],a:0,exp:"めど = rough target/timeframe。「〜をめどに」は納期の定番表現。"},
 {s:"yoho",q:"「踏まえる」",opts:["前回の反省を踏まえて、計画を修正した。","電車の中で足を踏まえられた。","山道で石を踏まえて転んだ。","アクセルを強く踏まえて加速した。"],a:0,exp:"踏まえる = based on / taking into account（結果・意見・状況を踏まえて）。"},
 {s:"yoho",q:"「相次ぐ」",opts:["今月に入ってシステム障害が相次いでいる。","彼と駅で相次いだ。","荷物を相次いで持ってください。","この道は車が相次げない。"],a:0,exp:"相次ぐ（あいつぐ）= to occur one after another（事故・障害・不祥事が相次ぐ）。"},
 {s:"yoho",q:"「問い合わせる」",opts:["納期について取引先に問い合わせた。","わからない単語を辞書に問い合わせた。","彼の意見に問い合わせできない。","ドアを強く問い合わせた。"],a:0,exp:"問い合わせる = to inquire（会社・窓口などに問い合わせる）。お問い合わせ。"},
 {s:"narabe",q:"今回の障害は、テストを　＿＿　＿＿　★　＿＿　と思われる。",opts:["起きた","省略した","ことが","原因で"],a:3,order:"省略した ことが 原因で 起きた",exp:"「テストを省略したことが原因で起きた」— ★の位置は「原因で」。"},
 {s:"narabe",q:"新システムは、コスト　＿＿　★　＿＿　＿＿　高く評価された。",opts:["削減に","点が","つながる","という"],a:2,order:"削減に つながる という 点が",exp:"「コスト削減につながるという点が高く評価された」— ★は「つながる」。"},
 {s:"narabe",q:"お忙しい　＿＿　＿＿　★　＿＿　誠にありがとうございます。",opts:["中","ご出席","いただき","にもかかわらず"],a:2,order:"中 にもかかわらず ご出席 いただき",exp:"「お忙しい中にもかかわらずご出席いただき」— ★は「ご出席」。"},
 {s:"narabe",q:"データの移行は、ユーザー　＿＿　★　＿＿　＿＿　深夜に実施する。",opts:["少ない","への","時間帯を選んで","影響が"],a:0,order:"への 影響が 少ない 時間帯を選んで",exp:"「ユーザーへの影響が少ない時間帯を選んで深夜に実施する」— ★は「少ない」。"},
 {s:"dokkai",passage:"社内のチャットツールが普及したことで、メールの数は確かに減った。しかし、それで仕事が楽になったかというと、必ずしもそうとは言えない。チャットは気軽に送れる分、確認や依頼が断片的に届き、受け手は一日中対応に追われることになる。手段が変わっただけで、情報のやり取りに使う時間はむしろ増えたという調査結果もある。",q:"筆者の考えに合うのはどれか。",opts:["チャットツールの普及が必ずしも業務の負担を減らしたとは言えない。","チャットツールのおかげでメール対応の時間が大幅に減った。","チャットよりメールのほうが気軽に送れるので効率的だ。","チャットツールを廃止してメールに戻すべきだ。"],a:0,exp:"「必ずしもそうとは言えない」「時間はむしろ増えた」が根拠。"},
 {s:"dokkai",passage:"会議の目的は「決めること」だと言われる。だが実際には、結論の出ない会議ほど長引くものだ。原因の多くは、参加者が事前に資料を読んでいないことにある。会議中に説明から始めれば、議論の時間は当然削られる。会議を短くしたければ、まず「読んでから集まる」文化を作ることだ。",q:"筆者によると、会議が長引く主な原因は何か。",opts:["参加者が事前に資料を読んでいないこと","会議の目的がそもそも決まっていないこと","参加者の人数が多すぎること","資料の量が多すぎること"],a:0,exp:"「原因の多くは、参加者が事前に資料を読んでいないことにある」と明示。"},
 {s:"dokkai",passage:"在宅勤務が定着し、通勤時間がなくなった分、自由な時間が増えたはずだった。ところが多くの社員から「以前より疲れる」という声が聞かれる。オンライン会議は移動がない分、隙間なく詰め込まれ、雑談のような息抜きの時間も消えた。効率が上がったように見えて、実は休む仕組みごと失われていたのである。",q:"「以前より疲れる」のはなぜだと筆者は考えているか。",opts:["会議が隙間なく入り、息抜きの時間がなくなったから","通勤時間が長くなったから","仕事の量そのものが増えたから","オンライン会議の操作が難しいから"],a:0,exp:"「隙間なく詰め込まれ」「息抜きの時間も消えた」「休む仕組みごと失われていた」が根拠。"},
 {s:"chokai",audio:"課長、先ほどの資料ですが、数字に誤りがありましたので、修正版をあとでメールでお送りします。",q:"この人はこれから何をしますか。",opts:["修正した資料をメールで送る","課長に資料を印刷して渡す","会議で数字を説明する","資料の誤りを課長に直してもらう"],a:0,exp:"「修正版をあとでメールでお送りします」= 自分が修正版を送る。"},
 {s:"chokai",audio:"申し訳ございません、その件につきましては、私では判断いたしかねますので、上司に確認のうえ、改めてご連絡いたします。",q:"この人は何と言っていますか。",opts:["自分では決められないので、確認してから連絡する","すぐにその場で決定する","上司に代わって謝罪する","この件はもう対応できないと断っている"],a:0,exp:"「判断いたしかねます」= 丁寧な不可。「確認のうえ、改めてご連絡」= 確認後に再連絡。"},
 {s:"chokai",audio:"リリースは金曜日の予定でしたが、テストで不具合が見つかったため、来週の水曜日に延期になりました。",q:"リリースはいつになりましたか。",opts:["来週の水曜日","今週の金曜日","今週の水曜日","来週の金曜日"],a:0,exp:"「来週の水曜日に延期になりました」。日付の聞き取りは定番。"},
];

const SECTIONS = {
 kanji:{label:"漢字読み",tag:"問題1",desc:"＿＿の言葉の読み方として最もよいものを一つ選びなさい。"},
 hyoki:{label:"表記",tag:"問題2",desc:"＿＿の言葉を漢字で書くとき、最もよいものを一つ選びなさい。"},
 bunmyaku:{label:"文脈規定",tag:"問題4",desc:"（　　）に入れるのに最もよいものを一つ選びなさい。"},
 iikae:{label:"語彙・意味",tag:"問題5",desc:"＿＿の言葉の意味として最もよいものを一つ選びなさい。"},
 yoho:{label:"用法",tag:"問題6",desc:"次の言葉の使い方として最もよいものを一つ選びなさい。"},
 bunpo:{label:"文法形式",tag:"問題7",desc:"次の文の（　　）に入れるのに最もよいものを一つ選びなさい。"},
 narabe:{label:"並べ替え",tag:"問題8",desc:"次の文の ★ に入る最もよいものを一つ選びなさい。"},
 dokkai:{label:"読解",tag:"問題10",desc:"次の文章を読んで、質問に答えなさい。"},
 chokai:{label:"聴解",tag:"聴解",desc:"音声を聞いて、最もよいものを一つ選びなさい。"},
};
const CIRCLED=["①","②","③","④"];

let BANK=[];
const state={screen:"home",mode:null,qs:[],cur:0,answers:[],picked:null,revealed:false,timeLeft:null,timer:null};

function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function prep(q){const idx=q.opts.map((_,i)=>i);const p=shuffle(idx);return{...q,opts:p.map(i=>q.opts[i]),a:p.indexOf(q.a)};}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function renderU(s){return esc(s).replace(/&lt;u&gt;/g,"<u>").replace(/&lt;\/u&gt;/g,"</u>");}
function speak(text,rate){
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";u.rate=rate;
  const jp=window.speechSynthesis.getVoices().find(v=>v.lang&&v.lang.startsWith("ja"));
  if(jp)u.voice=jp;
  window.speechSynthesis.speak(u);
}
function fmt(s){return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}

function startDrill(key){
  const pool=BANK.filter(q=>q.s===key);
  state.qs=shuffle(pool).slice(0,20).map(prep);
  Object.assign(state,{mode:key,cur:0,answers:[],picked:null,revealed:false,timeLeft:null,screen:"quiz"});
  render();
}
function startMock(){
  const pick=(k,n)=>shuffle(BANK.filter(q=>q.s===k)).slice(0,n);
  state.qs=[...pick("kanji",4),...pick("hyoki",3),...pick("bunmyaku",4),...pick("iikae",3),
            ...pick("yoho",2),...pick("bunpo",5),...pick("narabe",2),...pick("dokkai",2),...pick("chokai",3)].map(prep);
  Object.assign(state,{mode:"mock",cur:0,answers:[],picked:null,revealed:false,timeLeft:25*60,screen:"quiz"});
  tick();render();
}
function tick(){
  clearTimeout(state.timer);
  if(state.timeLeft===null||state.screen!=="quiz")return;
  if(state.timeLeft<=0){state.screen="results";render();return;}
  state.timer=setTimeout(()=>{state.timeLeft--;const el=document.getElementById("timer");if(el){el.textContent="⏱ "+fmt(state.timeLeft);el.className="timer"+(state.timeLeft<120?" low":"");}tick();},1000);
}
function choose(i){
  if(state.revealed)return;
  state.picked=i;state.revealed=true;
  const q=state.qs[state.cur];
  state.answers.push({q,picked:i,correct:i===q.a});
  render();
}
function next(){
  window.speechSynthesis.cancel();
  if(state.cur+1>=state.qs.length){state.screen="results";clearTimeout(state.timer);}
  else{state.cur++;state.picked=null;state.revealed=false;}
  render();
}
function goHome(){window.speechSynthesis.cancel();clearTimeout(state.timer);state.screen="home";render();}
function exportMisses(){
  const misses=state.answers.filter(a=>!a.correct).map(a=>({
    section:SECTIONS[a.q.s].label,
    question:(a.q.passage?a.q.passage+"\n\n":"")+(a.q.audio?a.q.audio+"\n\n":"")+a.q.q.replace(/<\/?u>/g,"＿"),
    correct_answer:a.q.opts[a.q.a],
    explanation:a.q.exp||"",
  }));
  const blob=new Blob([JSON.stringify(misses,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const el=document.createElement("a");el.href=url;el.download="n2_misses.json";el.click();
  URL.revokeObjectURL(url);
}

function header(title,right){
  return `<header><h1>${esc(title)}</h1><div style="display:flex;gap:16px;align-items:baseline">${right||""}</div></header>`;
}

function render(){
  const app=document.getElementById("app");
  if(state.screen==="home"){
    const total=BANK.length;
    app.innerHTML=header("日本語能力試験 N2 演習",`<span class="sub">${total.toLocaleString()}問収録</span>`)+
    `<div class="card">
      <div class="serif" style="font-size:17px;font-weight:700;margin-bottom:6px">模擬ミニテスト（25分・28問）</div>
      <p style="font-size:14px;color:var(--mid);line-height:1.8;margin:0 0 14px">語彙・文法・読解・聴解を本試験の出題順で。毎回ランダム出題。</p>
      <button class="btn gold" onclick="startMock()">模擬テストを開始</button>
    </div>
    <div class="hd2">セクション別ドリル（各20問ランダム）</div>
    <div class="grid">${Object.entries(SECTIONS).map(([k,sec])=>{
      const n=BANK.filter(q=>q.s===k).length;
      return `<button class="secBtn" onclick="startDrill('${k}')"><div class="t">${sec.tag}</div><div class="l">${sec.label}</div><div class="n">${n.toLocaleString()}問</div></button>`;
    }).join("")}</div>
    <footer>聴解は端末の日本語音声合成を使用。間違えた問題は結果画面からJSONで書き出せます。<br>
    出典（改変あり）：elzup/jlpt-word-list（JMdict/EDICT系, EDRDGライセンス）／ jkindrix/japanese-language-data（CC-BY-SA 4.0）／ 例文: Tatoeba Project（CC-BY 2.0 FR）。本アプリの問題データはCC-BY-SA 4.0で再配布可。JLPTはJEES・国際交流基金の商標であり、本アプリは非公式の学習ツールです。</footer>`;
    return;
  }
  if(state.screen==="quiz"){
    const q=state.qs[state.cur];const sec=SECTIONS[q.s];
    const optsHtml=q.opts.map((o,i)=>{
      let cls="opt";
      if(state.revealed){cls+=" locked";if(i===q.a)cls+=" correct";else if(i===state.picked)cls+=" wrong";}
      return `<button class="${cls}" onclick="choose(${i})"><span class="c">${CIRCLED[i]}</span><span>${esc(o)}</span></button>`;
    }).join("");
    app.innerHTML=header(state.mode==="mock"?"模擬テスト":sec.label,
      (state.timeLeft!==null?`<span class="timer${state.timeLeft<120?" low":""}" id="timer">⏱ ${fmt(state.timeLeft)}</span>`:"")+
      `<span class="sub">${state.cur+1} / ${state.qs.length}</span>`)+
    `<div class="card">
      <span class="tag">${sec.tag}</span>
      <div class="instr">${esc(sec.desc)}</div>
      ${q.passage?`<div class="passage">${esc(q.passage)}</div>`:""}
      ${q.audio?`<div style="display:flex;gap:10px;margin-bottom:18px">
        <button class="btn" onclick="speak(${JSON.stringify(q.audio)},1.0)">▶ 再生</button>
        <button class="btn ghost" onclick="speak(${JSON.stringify(q.audio)},0.75)">▶ ゆっくり</button>
      </div>`:""}
      <div class="qtext">${renderU(q.q)}</div>
      ${optsHtml}
      ${state.revealed?`<div class="exp">
        ${q.order?`<div style="margin-bottom:6px"><b>正しい順：</b>${esc(q.order)}</div>`:""}
        ${q.audio?`<div style="margin-bottom:6px;color:var(--mid)"><b>スクリプト：</b>${esc(q.audio)}</div>`:""}
        ${esc(q.exp||"")}
        ${q.en?`<div style="margin-top:6px;color:var(--mid)">EN: ${esc(q.en)}</div>`:""}
      </div>`:""}
    </div>
    ${state.revealed?`<div class="right"><button class="btn" onclick="next()">${state.cur+1>=state.qs.length?"結果を見る":"次へ →"}</button></div>`:""}
    <div style="margin-top:14px"><button class="btn ghost" onclick="goHome()">中断してホームへ</button></div>`;
    return;
  }
  if(state.screen==="results"){
    const total=state.answers.length;
    const correct=state.answers.filter(a=>a.correct).length;
    const pct=total?Math.round(correct/total*100):0;
    const misses=state.answers.filter(a=>!a.correct);
    const bySec={};
    state.answers.forEach(a=>{const k=a.q.s;bySec[k]=bySec[k]||{c:0,t:0};bySec[k].t++;if(a.correct)bySec[k].c++;});
    app.innerHTML=header("結果",`<span class="sub">${state.mode==="mock"?"模擬テスト":SECTIONS[state.mode].label}</span>`)+
    `<div class="card" style="text-align:center">
      <div class="score" style="color:${pct>=60?"var(--ok)":"var(--ng)"}">${correct} <span style="font-size:20px;color:var(--dim)">/ ${total}</span></div>
      <div style="font-size:14px;color:var(--mid)">正答率 ${pct}%（N2合格ラインの目安：各科目で約6割）</div>
    </div>
    <div class="card">
      <div class="serif" style="font-size:16px;font-weight:700;margin-bottom:10px">セクション別</div>
      ${Object.entries(bySec).map(([k,v])=>`<div class="row"><span class="serif">${SECTIONS[k].label}</span><span style="font-variant-numeric:tabular-nums;color:${v.c===v.t?"var(--ok)":"var(--ink)"}">${v.c} / ${v.t}</span></div>`).join("")}
    </div>
    ${misses.length?`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="serif" style="font-size:16px;font-weight:700">復習（${misses.length}問）</div>
        <button class="btn ghost" onclick="exportMisses()">JSONで書き出す</button>
      </div>
      ${misses.map(a=>`<div class="miss">
        <div class="serif" style="font-size:16px;margin-bottom:4px">${renderU(a.q.q)}</div>
        <div style="font-size:14px"><span style="color:var(--ng)">✗ ${esc(a.q.opts[a.picked])}</span>　→　<span style="color:var(--ok);font-weight:600">○ ${esc(a.q.opts[a.q.a])}</span></div>
        <div style="font-size:13.5px;color:var(--mid);margin-top:4px;line-height:1.7">${esc(a.q.exp||"")}</div>
      </div>`).join("")}
    </div>`:""}
    <div style="display:flex;gap:10px">
      <button class="btn" onclick="goHome()">ホームへ戻る</button>
      ${state.mode!=="mock"?`<button class="btn ghost" onclick="startDrill('${state.mode}')">もう一度</button>`:""}
    </div>`;
    return;
  }
}

/* preload voices (Chrome quirk) */
window.speechSynthesis&&window.speechSynthesis.getVoices();

fetch("questions.json").then(r=>r.json()).then(d=>{
  BANK=[...CURATED,...d.questions];
  render();
}).catch(()=>{
  BANK=[...CURATED];
  render();
});
</script>
</body>
</html>
